kind = "web"
previewPath = "/"
title = "AI Resume & Career Copilot"
version = "1.0.0"
id = "artifacts/ai-resume-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/", "/api/generate-resume", "/api/improve-resume", "/api/interview" ]
localPort = 18332

[services.development]
run = "pnpm --filter @workspace/ai-resume-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-resume-copilot", "run", "build" ]
run = "pnpm --filter @workspace/ai-resume-copilot run start"

[services.env]
PORT = "18332"
