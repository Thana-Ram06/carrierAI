kind = "web"
previewPath = "/"
title = "AI Resume & Career Copilot"
version = "1.0.0"
id = "artifacts/ai-resume-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18332

[services.development]
run = "pnpm --filter @workspace/ai-resume-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-resume-copilot", "run", "build" ]
publicDir = "artifacts/ai-resume-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18332"
BASE_PATH = "/"
