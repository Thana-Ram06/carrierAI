openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resume
    description: Resume and career AI operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /resume/generate:
    post:
      operationId: generateResume
      tags: [resume]
      summary: Generate a resume
      description: Generate a professional ATS-friendly resume from user inputs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateResumeBody"
      responses:
        "200":
          description: Generated resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeResult"

  /resume/improve:
    post:
      operationId: improveResume
      tags: [resume]
      summary: Improve an existing resume
      description: Takes an existing resume and returns an improved professional version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveResumeBody"
      responses:
        "200":
          description: Improved resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeResult"

  /resume/interview:
    post:
      operationId: generateInterviewQuestions
      tags: [resume]
      summary: Generate interview questions and answers
      description: Generate interview questions and model answers for a given role or skills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewBody"
      responses:
        "200":
          description: Interview questions and answers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GenerateResumeBody:
      type: object
      properties:
        name:
          type: string
        skills:
          type: string
        experience:
          type: string
        education:
          type: string
        targetRole:
          type: string
      required:
        - name
        - skills
        - experience
        - education

    ImproveResumeBody:
      type: object
      properties:
        resume:
          type: string
        targetRole:
          type: string
      required:
        - resume

    InterviewBody:
      type: object
      properties:
        role:
          type: string
        skills:
          type: string
      required:
        - role

    ResumeResult:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    InterviewResult:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/InterviewQA"
      required:
        - questions

    InterviewQA:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer
